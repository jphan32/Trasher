name: pi-ci

on:
  push:
    paths: ["pi/**", "fixtures/**", ".github/workflows/pi-ci.yml"]
  pull_request:
    paths: ["pi/**", "fixtures/**", ".github/workflows/pi-ci.yml"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pi
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync (cross-platform deps + dev group, no Pi hardware)
        run: uv sync
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run mypy
      - name: Test
        run: uv run pytest -q
