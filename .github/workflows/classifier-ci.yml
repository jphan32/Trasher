name: classifier-ci

on:
  push:
    paths: ["classifier/**", ".github/workflows/classifier-ci.yml"]
  pull_request:
    paths: ["classifier/**", ".github/workflows/classifier-ci.yml"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: classifier
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync
        run: uv sync
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run mypy
      - name: Test (mock 기반 — 네트워크/키 불필요)
        run: uv run pytest -q
